<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Checker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: LightGray;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }

        h1 {
            color: DarkSlatedGray;
            font-size: 24px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid LightGray;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: RoyalBlue;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: RoyalBlue;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: DarkBlue;
        }

        #res {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 600;
            color: Charcoal;
            min-height: 27px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Even or Odd Checker</h1>
        <input type="number" id="num" placeholder="Enter a number"> 
        <button onclick="checkEvenOdd()">Check</button> 
        <p id="res"></p> 
    </div>

    <script>
        function checkEvenOdd() {
            const num = parseInt(document.getElementById('num').value);
            const resultElement = document.getElementById('res');
            
            if (isNaN(num)) {
                resultElement.innerText = "Please enter a valid number";
                resultElement.style.color = "Crimson";
                return;
            }
            
            if (num % 2 === 0) {
                resultElement.innerText = `${num} is Even`;
                resultElement.style.color = "Green";
            } else {
                resultElement.innerText = `${num} is Odd`;
                resultElement.style.color = "Orange";
            }
        }
    </script>

</body>
</html>
